<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Metrics Dashboard · Apr 2025 – Mar 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a;
    --accent:#6c63ff; --accent2:#00d4aa; --accent3:#ff6b6b; --accent4:#ffa94d;
    --text:#e8eaf0; --muted:#8890a8; --border:#2e3348;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

  /* ── Header ── */
  header{
    background:linear-gradient(135deg,#1a1d27 0%,#16192a 100%);
    border-bottom:1px solid var(--border);
    padding:16px 28px 0; position:sticky; top:0; z-index:100;
  }
  .header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:12px;}
  header h1{font-size:1.25rem;font-weight:800;white-space:nowrap;}
  header h1 span{color:var(--accent);}
  .header-right{display:flex;align-items:center;gap:14px;}
  .date-badge{background:rgba(108,99,255,.18);color:#a09fff;border-radius:20px;padding:4px 12px;font-size:.73rem;font-weight:700;}
  #last-updated{font-size:.72rem;color:var(--muted);}
  #dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent2);margin-right:5px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ── Tabs ── */
  .tab-bar{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab{
    padding:10px 22px; font-size:.82rem; font-weight:700; cursor:pointer;
    border-radius:8px 8px 0 0; border:1px solid transparent; border-bottom:none;
    color:var(--muted); background:transparent; white-space:nowrap;
    transition:color .15s,background .15s;
  }
  .tab:hover{color:var(--text);background:rgba(255,255,255,.04);}
  .tab.active{color:var(--text);background:var(--bg);border-color:var(--border);position:relative;}
  .tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--accent);}
  .tab .geo-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle;}

  main{max-width:1440px;margin:0 auto;padding:24px 22px 56px;}

  /* ── Section labels ── */
  .sec-label{font-size:.68rem;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin:28px 0 12px;display:flex;align-items:center;gap:8px;}
  .sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

  /* ── KPI cards ── */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;cursor:default;}
  .kpi:hover{border-color:var(--accent);transform:translateY(-2px);}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--accent));}
  .kpi-label{font-size:.68rem;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;}
  .kpi-val{font-size:1.5rem;font-weight:900;line-height:1.1;}
  .kpi-sub{font-size:.7rem;color:var(--muted);margin-top:6px;}
  .badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.7rem;font-weight:700;margin-top:5px;}
  .up{background:rgba(0,212,170,.15);color:#00d4aa;}
  .down{background:rgba(255,107,107,.15);color:#ff6b6b;}
  .flat{background:rgba(108,99,255,.15);color:#a09fff;}

  /* ── Charts ── */
  .charts-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(520px,1fr));gap:18px;}
  .charts-3{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px;}
  @media(max-width:580px){.charts-2,.charts-3{grid-template-columns:1fr;}}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;}
  .chart-title{font-size:.82rem;font-weight:700;margin-bottom:16px;}
  .chart-title small{color:var(--muted);font-weight:400;margin-left:5px;font-size:.74rem;}
  .ch{position:relative;height:200px;}

  /* ── Table ── */
  .tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
  table{width:100%;border-collapse:collapse;font-size:.76rem;}
  thead tr{background:var(--surface2);}
  th{padding:9px 12px;text-align:right;color:var(--muted);font-weight:700;font-size:.67rem;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;}
  th:first-child{text-align:left;min-width:190px;}
  td{padding:9px 12px;text-align:right;border-top:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums;}
  td:first-child{text-align:left;color:var(--muted);font-weight:600;}
  .group-row td{background:var(--surface2);color:var(--muted);font-size:.67rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;}
  tr:not(.group-row):hover td{background:rgba(108,99,255,.06);}
  .hi{color:var(--text)!important;font-weight:800;}

  /* ── Loading ── */
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;}
  .spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load-txt{color:var(--muted);font-size:.82rem;}

  /* ── Board Commentary ── */
  .commentary-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;border-left:3px solid var(--accent);}
  .commentary-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:6px;}
  .commentary-hdr h3{font-size:.82rem;font-weight:800;letter-spacing:.4px;}
  .commentary-hdr span{font-size:.7rem;color:var(--muted);}
  .c-bullets{display:flex;flex-direction:column;gap:0;}
  .c-row{display:grid;grid-template-columns:22px 1fr;gap:8px;align-items:start;padding:8px 0;border-bottom:1px solid var(--border);}
  .c-row:last-child{border-bottom:none;padding-bottom:0;}
  .c-icon{font-size:.75rem;font-weight:900;padding-top:2px;text-align:center;}
  .c-icon.pos{color:#00d4aa;} .c-icon.neg{color:#ff6b6b;} .c-icon.warn{color:#ffa94d;} .c-icon.neu{color:#8890a8;}
  .c-text{font-size:.8rem;line-height:1.6;color:var(--text);}
  .c-text strong{color:#fff;font-weight:700;}
  .gtag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;font-weight:700;margin:0 1px;vertical-align:middle;}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Metrics <span>Dashboard</span></h1>
    <div class="header-right">
      <span class="date-badge">Apr 2025 – Mar 2026</span>
      <span id="last-updated"><span id="dot"></span>Loading…</span>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
</header>

<main>
  <div id="loading"><div class="spin"></div><div class="load-txt">Fetching live data…</div></div>
  <div id="dash" style="display:none"></div>
</main>

<script>
// ── Tab configuration ─────────────────────────────────────────────────────────
const SHEET_ID   = '1vn7lZbtU-T4v09N0veR_VLKTtSOUFlQT_K_0yF9J3Es';
const RANGE_START = 'April 2025';
const RANGE_END   = 'March 2026';

const TABS = [
  { id:'overall', label:'Overall',  sheet:'Overall Metrics', color:'#6c63ff' },
  { id:'namr',    label:'NAMR',     sheet:'NAMR Metrics',    color:'#00d4aa' },
  { id:'eu',      label:'EU',       sheet:'EU Metrics',      color:'#ffa94d' },
  { id:'india',   label:'India',    sheet:'India Metrics',   color:'#ff6b6b' },
  { id:'latam',   label:'LATAM',    sheet:'LATAM Metrics',   color:'#cba6f7' },
];

// Keys that differ across sheets — map to a canonical name
const KEY_ALIASES = {
  'MAU (Mn)'          : 'MAU',
  'DAU(Mn)'           : 'DAU',
  'Marketing Cost ($ M)' : 'Marketing Cost ($',
  'Marketing Cost ($ )' : 'Marketing Cost ($',
  'Paid/ Overall Playtime' : 'Paid/Overall Playtime',
};

let activeTab    = 'overall';
let chartInstances = [];

// ── Build tab bar ─────────────────────────────────────────────────────────────
const tabBar = document.getElementById('tab-bar');
TABS.forEach(t => {
  const el = document.createElement('button');
  el.className = 'tab' + (t.id === activeTab ? ' active' : '');
  el.dataset.id = t.id;
  el.innerHTML = `<span class="geo-dot" style="background:${t.color}"></span>${t.label}`;
  el.onclick = () => switchTab(t.id);
  tabBar.appendChild(el);
});

function switchTab(id) {
  if (id === activeTab) return;
  activeTab = id;
  document.querySelectorAll('.tab').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });
  loadTab(id);
}

// ── CSV helpers ───────────────────────────────────────────────────────────────
function parseCSV(txt) {
  const rows = [];
  const lines = txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cells = []; let cur='', inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if (c==='"') { if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
      else if (c===','&&!inQ) { cells.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function n(s) {
  if (s==null||s==='') return null;
  const v = parseFloat(String(s).replace(/[,$%]/g,''));
  return isNaN(v) ? null : v;
}

// ── Formatters ────────────────────────────────────────────────────────────────
function fmtBig(v)  { if(v==null)return'—'; if(v>=1e9)return(v/1e9).toFixed(2)+'B'; if(v>=1e6)return(v/1e6).toFixed(2)+'M'; if(v>=1e3)return(v/1e3).toFixed(1)+'K'; return v.toLocaleString(); }
function fmtCur(v)  { if(v==null)return'—'; if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M'; if(v>=1e3)return'$'+(v/1e3).toFixed(0)+'K'; return'$'+v.toFixed(0); }
function fmtPct(v,d=1){ return v==null?'—':Number(v).toFixed(d)+'%'; }
function fmtMin(v)  { if(v==null)return'—'; if(v>=1e6)return(v/1e6).toFixed(1)+'M'; if(v>=1e3)return(v/1e3).toFixed(0)+'K'; return v.toFixed(0); }
function fmtDec(v,d=2){ return v==null?'—':Number(v).toFixed(d); }
function delta(arr,i){ if(!arr||i===0||arr[i]==null||arr[i-1]==null||arr[i-1]===0)return null; return((arr[i]-arr[i-1])/arr[i-1])*100; }
function pp(a,b){ const v=(a??NaN)-(b??NaN); return isNaN(v)?null:v; }
function badgeHtml(pct,suffix='%'){
  if(pct==null||isNaN(pct))return'';
  const dir=pct>0.05?'up':pct<-0.05?'down':'flat', arrow=pct>0?'▲':'▼';
  return `<span class="badge ${dir}">${arrow} ${Math.abs(pct).toFixed(1)}${suffix} MoM</span>`;
}

// ── Chart helper ──────────────────────────────────────────────────────────────
const GRID_COL='rgba(255,255,255,0.05)';
function mkChart(id,type,labels,datasets,opts={}) {
  const ctx=document.getElementById(id);
  if(!ctx)return;
  const inst = new Chart(ctx.getContext('2d'),{type,data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{labels:{color:'#8890a8',font:{size:10},boxWidth:11,padding:12}},
      tooltip:{backgroundColor:'#1a1d27',borderColor:'#2e3348',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#8890a8'}
    },
    scales:{
      x:{ticks:{color:'#8890a8',font:{size:9},maxRotation:40},grid:{color:GRID_COL}},
      y:{ticks:{color:'#8890a8',font:{size:9},callback:opts.yFmt||(v=>fmtBig(v))},grid:{color:GRID_COL},...(opts.y||{})},
      ...(opts.y2?{y2:{position:'right',ticks:{color:'#8890a8',font:{size:9},callback:opts.y2Fmt||(v=>v)},grid:{drawOnChartArea:false},...opts.y2}}:{})
    }
  }});
  chartInstances.push(inst);
}

// ── Load & render ─────────────────────────────────────────────────────────────
function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&_=${Date.now()}`;
}

async function loadTab(id) {
  const tab = TABS.find(t=>t.id===id);
  showLoading(true);
  chartInstances.forEach(c=>c.destroy());
  chartInstances=[];
  try {
    if (id === 'overall') {
      // Fetch Overall + all 4 geo sheets in parallel for commentary
      const geoTabs = TABS.filter(t=>t.id!=='overall');
      const [overallTxt, ...geoTxts] = await Promise.all([
        fetch(sheetUrl(tab.sheet)).then(r=>r.text()),
        ...geoTabs.map(t=>fetch(sheetUrl(t.sheet)).then(r=>r.text()))
      ]);
      const geoData = geoTabs.map((t,i)=>({ id:t.id, label:t.label, color:t.color, rows:parseCSV(geoTxts[i]) }));
      render(parseCSV(overallTxt), tab, geoData);
    } else {
      const txt = await fetch(sheetUrl(tab.sheet)).then(r=>r.text());
      render(parseCSV(txt), tab, []);
    }
  } catch(e) {
    document.getElementById('loading').innerHTML=`<div style="color:#ff6b6b;text-align:center">Failed to load ${tab.label} data.<br><small>${e.message}</small></div>`;
    showLoading(true);
  }
}

function showLoading(show) {
  document.getElementById('loading').style.display = show?'flex':'none';
  document.getElementById('dash').style.display    = show?'none':'block';
}

// ── Geography metric extractor (for commentary) ───────────────────────────────
function extractGeoMetrics(rows) {
  const allMonths = rows[1].slice(2).filter(Boolean);
  const mo = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const mNum = s => { const [nm,yr]=s.split(' '); return (+yr)*12+mo.indexOf(nm); };
  const sN=mNum(RANGE_START), eN=mNum(RANGE_END);
  const idxs = allMonths.map((m,i)=>{ const v=mNum(m); return(v>=sN&&v<=eN)?i:-1; }).filter(i=>i>=0);
  const latI = idxs.length-1, prevI = latI>0?latI-1:0;
  const M={};
  for(const row of rows.slice(2)){
    let label=row[1]; if(!label) continue;
    M[KEY_ALIASES[label]||label] = idxs.map(i=>n(row[2+i]));
  }
  const g=k=>M[k]||[];
  const mau=g('MAU'), dau=g('DAU'), dauMauR=g('DAU/MAU'),
        payMau=g('Paying MAU'), payMauPct=g('Paying MAU/MAU'),
        mktCost=g('Marketing Cost ($'), npu=g('NPU'), txns=g('Transactions');
  return {
    mauLat:   mau[latI],      mauMoM:     delta(mau,latI),
    dauLat:   dau[latI],      dauMoM:     delta(dau,latI),
    dauMauR:  dauMauR[latI],
    payMauLat:payMau[latI],   payMauMoM:  delta(payMau,latI),
    payMauPct:payMauPct[latI],
    mktLat:   mktCost[latI],  mktMoM:     delta(mktCost,latI),
    npuLat:   npu[latI],      npuMoM:     delta(npu,latI),
    txnsLat:  txns[latI],     txnsMoM:    delta(txns,latI),
  };
}

// ── Board-level commentary builder ────────────────────────────────────────────
function buildCommentary(geoData, overallMau, latMon) {
  const geos = geoData.map(g => ({ ...g, ...extractGeoMetrics(g.rows) }));

  const tag  = (g) => `<span class="gtag" style="background:${g.color}22;color:${g.color}">${g.label}</span>`;
  const pct  = v  => v==null?'—':(v>0?'+':'')+v.toFixed(1)+'%';
  const abs  = v  => fmtBig(v);
  const rank = (arr, key, asc=false) => [...arr].sort((a,b)=> asc ? (a[key]??-Infinity)-(b[key]??-Infinity) : (b[key]??-Infinity)-(a[key]??-Infinity));

  const bullets = [];

  // 1. MAU growth rank across geos
  const byMAUGrowth = rank(geos,'mauMoM');
  const topG = byMAUGrowth[0], botG = byMAUGrowth[byMAUGrowth.length-1];
  const allPos = geos.every(g=>g.mauMoM!=null&&g.mauMoM>0);
  const growthStr = byMAUGrowth.map(g=>`${tag(g)} ${pct(g.mauMoM)}`).join(' · ');
  const call = allPos ? 'All geos growing.' : botG.mauMoM!=null&&botG.mauMoM<0 ? `${tag(botG)} remains a drag.` : `${tag(botG)} the softest.`;
  bullets.push({ cls:'pos', icon:'▲', text:`<strong>MAU Growth:</strong> ${growthStr}. ${call}` });

  // 2. Scale — India share of overall MAU
  const india = geos.find(g=>g.id==='india');
  const shareStr = overallMau&&india?.mauLat ? ` (${((india.mauLat/overallMau)*100).toFixed(0)}% of total MAU)` : '';
  const byMAU = rank(geos,'mauLat');
  const smallest = byMAU[byMAU.length-1];
  bullets.push({ cls:'neu', icon:'◉', text:`<strong>Scale:</strong> ${tag(byMAU[0])} largest geo at ${abs(byMAU[0].mauLat)}${shareStr}; ${tag(smallest)} smallest at ${abs(smallest.mauLat)} but growing at ${pct(smallest.mauMoM)} MoM.` });

  // 3. Engagement quality — DAU/MAU spread
  const byEng = rank(geos,'dauMauR');
  const topE = byEng[0], botE = byEng[byEng.length-1];
  const spread = (topE.dauMauR!=null&&botE.dauMauR!=null) ? ((topE.dauMauR-botE.dauMauR).toFixed(1)+'pp spread') : '';
  bullets.push({ cls: topE.dauMauR>25?'pos':'warn', icon:'◈', text:`<strong>Engagement (DAU/MAU):</strong> ${tag(topE)} leads at ${fmtPct(topE.dauMauR)}; ${tag(botE)} lowest at ${fmtPct(botE.dauMauR)}${spread?' — '+spread:''}.` });

  // 4. Monetisation density + fastest grower
  const byPayPct = rank(geos,'payMauPct');
  const byPayMoM = rank(geos,'payMauMoM');
  const densityLeader = byPayPct[0], growthLeader = byPayMoM[0];
  const monetNote = densityLeader.id===growthLeader.id
    ? `${tag(densityLeader)} leads on both density (${fmtPct(densityLeader.payMauPct)}) and growth (${pct(densityLeader.payMauMoM)}).`
    : `${tag(densityLeader)} highest density at ${fmtPct(densityLeader.payMauPct)}; ${tag(growthLeader)} fastest growth at ${pct(growthLeader.payMauMoM)} MoM.`;
  bullets.push({ cls:'pos', icon:'$', text:`<strong>Monetisation:</strong> ${monetNote}` });

  // 5. Marketing efficiency — cost growth vs MAU growth delta, flag outliers
  const effGeos = geos.filter(g=>g.mktMoM!=null&&g.mauMoM!=null);
  if(effGeos.length){
    const byEff = rank(effGeos, 'x').map(g=>({...g, x:(g.mktMoM-g.mauMoM)})).sort((a,b)=>a.x-b.x);
    const leanest=byEff[0], heaviest=byEff[byEff.length-1];
    const isSame = leanest.id===heaviest.id;
    if(!isSame){
      const lSign = leanest.x<0?'cost growing slower than MAU — efficient':'over-spending vs MAU return';
      bullets.push({ cls: leanest.x<0?'pos':'warn', icon:'⬡', text:`<strong>Mktg Efficiency:</strong> ${tag(leanest)} most efficient (${pct(leanest.mktMoM)} cost vs ${pct(leanest.mauMoM)} MAU); ${tag(heaviest)} highest overspend gap (${pct(heaviest.mktMoM)} cost vs ${pct(heaviest.mauMoM)} MAU).` });
    }
  }

  // 6. Watch item — DAU declining while MAU growing, or NPU softness
  const dauWarn = geos.filter(g=>g.mauMoM!=null&&g.dauMoM!=null&&g.mauMoM>0&&g.dauMoM<0);
  const npuWarn = geos.filter(g=>g.npuMoM!=null&&g.npuMoM<-10);
  if(dauWarn.length){
    bullets.push({ cls:'warn', icon:'▼', text:`<strong>Watch:</strong> ${dauWarn.map(g=>`${tag(g)} DAU declining (${pct(g.dauMoM)}) despite MAU recovery — engagement conversion lagging.`).join(' ')}` });
  } else if(npuWarn.length){
    bullets.push({ cls:'warn', icon:'▼', text:`<strong>Watch:</strong> New Paying Users declining in ${npuWarn.map(g=>`${tag(g)} (${pct(g.npuMoM)})`).join(', ')} — monitor top-of-funnel monetisation health.` });
  }

  return bullets;
}

function render(rows, tab, geoData=[]) {
  // ── Build normalised metric map ─────────────────────────────────────────
  const allMonths = rows[1].slice(2).filter(Boolean);
  const monthOrder=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const mNum = s => { const [name,yr]=s.split(' '); return (+yr)*12+monthOrder.indexOf(name); };
  const sN=mNum(RANGE_START), eN=mNum(RANGE_END);
  const idxs  = allMonths.map((m,i)=>{ const v=mNum(m); return(v>=sN&&v<=eN)?i:-1; }).filter(i=>i>=0);
  const months = idxs.map(i=>allMonths[i]);
  const latI   = months.length-1;
  const prevI  = latI>0?latI-1:0;
  const latMon = months[latI];
  const SL     = months.map(m=>m.replace(' 20',"'").replace(' 202',"'2"));

  const M = {};
  for (const row of rows.slice(2)) {
    let label = row[1]; if(!label) continue;
    const canonical = KEY_ALIASES[label] || label;
    M[canonical] = idxs.map(i=>n(row[2+i]));
  }

  // shorthand getter — returns [] if missing
  const g = k => M[k]||[];

  const mau        = g('MAU');
  const mauGrowth  = g('MAU Growth');
  const dau        = g('DAU');
  const dauMau     = g('DAU/MAU');
  const payMau     = g('Paying MAU');
  const payDau     = g('Paying DAU');
  const payMauPct  = g('Paying MAU/MAU');
  const payDauPct  = g('Paying DAU/Paying MAU');
  const mktCost    = g('Marketing Cost ($');
  const mktGrowth  = g('Marketing Cost Growth');
  const installs   = g('Installs');
  const cumInst    = g('Cumulative Installs');
  const payUsersC  = g('Paying Users (Cumulative)');
  const txns       = g('Transactions');
  const npu        = g('NPU');
  const dailyLdau  = g('Daily LDAU');
  const dailyPLdau = g('Daily Paying LDAU');
  const paidLdauPct= g('Paid LDAU %');
  const monLdau    = g('Monthly LDAU');
  const monPLdau   = g('Monthly Paid LDAU');
  const totalPT    = g('Total Playtime (Mins)');
  const paidPT     = g('Paid Playtime (Mins)');
  const ptLdau     = g('Playtime/LDAU (Mins)');
  const paidOvPT   = g('Paid/Overall Playtime');

  // ── KPI card builder ─────────────────────────────────────────────────────
  const kpi = (label,val,chg,unit='',color='#6c63ff',sub='') =>
    `<div class="kpi" style="--kc:${color}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-val">${val}</div>
      ${badgeHtml(chg,unit)}
      <div class="kpi-sub">${sub||latMon}</div>
    </div>`;

  // ── Commentary (Overall tab only) ───────────────────────────────────────
  let commentaryHtml = '';
  if (tab.id === 'overall' && geoData.length) {
    const bullets = buildCommentary(geoData, mau[latI], latMon);
    const rows_html = bullets.map(b=>`
      <div class="c-row">
        <div class="c-icon ${b.cls}">${b.icon}</div>
        <div class="c-text">${b.text}</div>
      </div>`).join('');
    commentaryHtml = `
    <div class="commentary-card">
      <div class="commentary-hdr">
        <h3>Board Commentary · Geographic Performance</h3>
        <span>${latMon} · Apr 2025 – Mar 2026</span>
      </div>
      <div class="c-bullets">${rows_html}</div>
    </div>`;
  }

  // ── Build dashboard HTML ─────────────────────────────────────────────────
  document.getElementById('dash').innerHTML = commentaryHtml + `
  <div class="sec-label">Users &amp; Growth</div>
  <div class="kpi-grid">
    ${kpi('MAU',          fmtBig(mau[latI]),      delta(mau,latI),          '%',  '#6c63ff')}
    ${kpi('DAU',          fmtBig(dau[latI]),      delta(dau,latI),          '%',  '#00d4aa')}
    ${kpi('DAU / MAU',    fmtPct(dauMau[latI]),   pp(dauMau[latI],dauMau[prevI]),'pp','#74c7ec')}
    ${kpi('Paying MAU',   fmtBig(payMau[latI]),   delta(payMau,latI),       '%',  '#ffa94d')}
    ${kpi('Paying DAU',   fmtBig(payDau[latI]),   delta(payDau,latI),       '%',  '#f38ba8')}
    ${kpi('Paying MAU %', fmtPct(payMauPct[latI]),pp(payMauPct[latI],payMauPct[prevI]),'pp','#cba6f7')}
    ${kpi('Paying DAU %', fmtPct(payDauPct[latI]),pp(payDauPct[latI],payDauPct[prevI]),'pp','#89dceb')}
  </div>
  <div class="charts-2" style="margin-top:16px">
    <div class="chart-card"><div class="chart-title">MAU vs DAU<small>monthly users</small></div><div class="ch"><canvas id="c-mau"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Paying Users<small>MAU &amp; DAU</small></div><div class="ch"><canvas id="c-paying"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Engagement Ratios<small>DAU/MAU · Paying MAU/MAU · Paying DAU/Paying MAU</small></div><div class="ch"><canvas id="c-ratios"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">MAU MoM Growth<small>%</small></div><div class="ch"><canvas id="c-growth"></canvas></div></div>
  </div>

  <div class="sec-label">Acquisition &amp; Revenue</div>
  <div class="kpi-grid">
    ${kpi('Installs',            fmtBig(installs[latI]),  delta(installs,latI),  '%', '#a6e3a1')}
    ${kpi('Cumulative Installs', fmtBig(cumInst[latI]),   null,                  '',  '#94e2d5')}
    ${kpi('Paying Users (Cum.)', fmtBig(payUsersC[latI]), delta(payUsersC,latI), '%', '#f9e2af')}
    ${kpi('Transactions',        fmtBig(txns[latI]),      delta(txns,latI),      '%', '#fab387')}
    ${kpi('NPU',                 fmtBig(npu[latI]),       delta(npu,latI),       '%', '#eba0ac')}
    ${kpi('Marketing Cost',      fmtCur(mktCost[latI]),   delta(mktCost,latI),   '%', '#cdd6f4')}
  </div>
  <div class="charts-2" style="margin-top:16px">
    <div class="chart-card"><div class="chart-title">Monthly Installs<small>raw &amp; cumulative</small></div><div class="ch"><canvas id="c-inst"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Marketing Cost<small>USD + MoM growth %</small></div><div class="ch"><canvas id="c-mkt"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Transactions &amp; NPU<small>monthly</small></div><div class="ch"><canvas id="c-txn"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Paying Users (Cumulative)<small>unique payers</small></div><div class="ch"><canvas id="c-pu"></canvas></div></div>
  </div>

  <div class="sec-label">Playtime &amp; Engagement</div>
  <div class="kpi-grid">
    ${kpi('Daily LDAU',        fmtBig(dailyLdau[latI]),   delta(dailyLdau,latI),    '%',  '#6c63ff')}
    ${kpi('Daily Paying LDAU', fmtBig(dailyPLdau[latI]),  delta(dailyPLdau,latI),   '%',  '#00d4aa')}
    ${kpi('Paid LDAU %',       fmtPct(paidLdauPct[latI]), pp(paidLdauPct[latI],paidLdauPct[prevI]),'pp','#ffa94d')}
    ${kpi('Monthly LDAU',      fmtBig(monLdau[latI]),     delta(monLdau,latI),      '%',  '#f38ba8')}
    ${kpi('Monthly Paid LDAU', fmtBig(monPLdau[latI]),    delta(monPLdau,latI),     '%',  '#a6e3a1')}
    ${kpi('Total Playtime',    fmtMin(totalPT[latI])+'M min', delta(totalPT,latI),  '%',  '#cba6f7')}
    ${kpi('Paid Playtime',     fmtMin(paidPT[latI])+'M min',  delta(paidPT,latI),   '%',  '#89dceb')}
    ${kpi('Playtime / LDAU',   fmtDec(ptLdau[latI],1)+' min', delta(ptLdau,latI),  '%',  '#eba0ac')}
    ${kpi('Paid/Total Playtime',fmtPct(paidOvPT[latI]),  pp(paidOvPT[latI],paidOvPT[prevI]),'pp','#fab387')}
  </div>
  <div class="charts-3" style="margin-top:16px">
    <div class="chart-card"><div class="chart-title">Daily LDAU<small>paid vs total</small></div><div class="ch"><canvas id="c-ldau"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Monthly Playtime<small>total vs paid (mins)</small></div><div class="ch"><canvas id="c-pt"></canvas></div></div>
    <div class="chart-card"><div class="chart-title">Playtime / LDAU<small>mins per user</small></div><div class="ch"><canvas id="c-ptldau"></canvas></div></div>
  </div>

  <div class="sec-label">Full Data Table</div>
  <div class="tbl-wrap"><table id="tbl"></table></div>`;

  // ── Charts ────────────────────────────────────────────────────────────────
  mkChart('c-mau','line',SL,[
    {label:'MAU',data:mau,borderColor:'#6c63ff',backgroundColor:'rgba(108,99,255,.1)',fill:true,tension:.35,pointRadius:3},
    {label:'DAU',data:dau,borderColor:'#00d4aa',backgroundColor:'rgba(0,212,170,.08)',fill:true,tension:.35,pointRadius:3}
  ]);

  mkChart('c-paying','line',SL,[
    {label:'Paying MAU',data:payMau,borderColor:'#ffa94d',backgroundColor:'rgba(255,169,77,.1)',fill:true,tension:.35,pointRadius:3},
    {label:'Paying DAU',data:payDau,borderColor:'#f38ba8',backgroundColor:'rgba(243,139,168,.1)',fill:true,tension:.35,pointRadius:3}
  ]);

  mkChart('c-ratios','line',SL,[
    {label:'DAU/MAU %',data:dauMau,borderColor:'#74c7ec',tension:.35,pointRadius:3},
    {label:'Paying MAU/MAU %',data:payMauPct,borderColor:'#cba6f7',tension:.35,pointRadius:3},
    {label:'Paying DAU/Paying MAU %',data:payDauPct,borderColor:'#a6e3a1',tension:.35,pointRadius:3,borderDash:[4,3]}
  ],{yFmt:v=>v?.toFixed(1)+'%'});

  mkChart('c-growth','bar',SL,[
    {label:'MoM %',data:mauGrowth,backgroundColor:mauGrowth.map(v=>v==null?'transparent':v>=0?'rgba(0,212,170,.7)':'rgba(255,107,107,.7)'),borderRadius:4}
  ],{yFmt:v=>v?.toFixed(1)+'%'});

  mkChart('c-inst','bar',SL,[
    {label:'Monthly Installs',data:installs,backgroundColor:'rgba(166,227,161,.55)',borderRadius:4,yAxisID:'y'},
    {label:'Cumulative Installs',data:cumInst,type:'line',borderColor:'#94e2d5',tension:.3,pointRadius:2,yAxisID:'y2'}
  ],{y2:{},yFmt:v=>fmtBig(v),y2Fmt:v=>fmtBig(v)});

  mkChart('c-mkt','bar',SL,[
    {label:'Marketing Cost',data:mktCost,backgroundColor:mktCost.map(v=>v==null?'transparent':'rgba(205,214,244,.5)'),borderRadius:4,yAxisID:'y'},
    {label:'MoM Growth %',data:mktGrowth,type:'line',borderColor:'#ffa94d',tension:.4,pointRadius:4,
      pointBackgroundColor:mktGrowth.map(v=>v==null?'transparent':v>=0?'#00d4aa':'#ff6b6b'),borderWidth:2,yAxisID:'y2'}
  ],{yFmt:v=>fmtCur(v),y2Fmt:v=>v==null?'':v.toFixed(1)+'%',y2:{grid:{drawOnChartArea:false},ticks:{color:'#ffa94d',font:{size:9}}}});

  mkChart('c-txn','bar',SL,[
    {label:'Transactions',data:txns,backgroundColor:'rgba(250,179,135,.55)',borderRadius:4,yAxisID:'y'},
    {label:'NPU',data:npu,type:'line',borderColor:'#eba0ac',tension:.3,pointRadius:3,yAxisID:'y2'}
  ],{y2:{},yFmt:v=>fmtBig(v),y2Fmt:v=>fmtBig(v)});

  mkChart('c-pu','line',SL,[
    {label:'Paying Users (Cumulative)',data:payUsersC,borderColor:'#f9e2af',backgroundColor:'rgba(249,226,175,.1)',fill:true,tension:.3,pointRadius:3}
  ]);

  mkChart('c-ldau','line',SL,[
    {label:'Daily LDAU',data:dailyLdau,borderColor:'#6c63ff',backgroundColor:'rgba(108,99,255,.1)',fill:true,tension:.3,pointRadius:3},
    {label:'Daily Paying LDAU',data:dailyPLdau,borderColor:'#00d4aa',backgroundColor:'rgba(0,212,170,.08)',fill:true,tension:.3,pointRadius:3}
  ]);

  mkChart('c-pt','bar',SL,[
    {label:'Total Playtime',data:totalPT,backgroundColor:'rgba(203,166,247,.45)',borderRadius:4},
    {label:'Paid Playtime',data:paidPT,backgroundColor:'rgba(137,220,235,.55)',borderRadius:4}
  ],{yFmt:v=>fmtMin(v)+'M'});

  mkChart('c-ptldau','line',SL,[
    {label:'Playtime/LDAU (min)',data:ptLdau,borderColor:'#eba0ac',backgroundColor:'rgba(235,160,172,.1)',fill:true,tension:.3,pointRadius:3}
  ],{yFmt:v=>v?.toFixed(1)});

  // ── Data table ────────────────────────────────────────────────────────────
  const groups = [
    { name:'Users & Growth', rows:[
      {k:'MAU',fmt:'big'},{k:'MAU Growth',fmt:'pct'},{k:'DAU',fmt:'big'},{k:'DAU/MAU',fmt:'pct'},
      {k:'Paying MAU',fmt:'big'},{k:'Paying MAU/MAU',fmt:'pct'},{k:'Paying DAU',fmt:'big'},{k:'Paying DAU/Paying MAU',fmt:'pct'},
    ]},
    { name:'Acquisition & Revenue', rows:[
      {k:'Installs',fmt:'big'},{k:'Cumulative Installs',fmt:'big'},{k:'MAU/Cumulative Installs',fmt:'pct'},
      {k:'Paying Users (Cumulative)',fmt:'big'},{k:'Paying Users Growth',fmt:'pct'},
      {k:'Transactions',fmt:'big'},{k:'Transactions Growth',fmt:'pct'},
      {k:'NPU',fmt:'big'},{k:'NPU Growth',fmt:'pct'},
      {k:'Marketing Cost ($',label:'Marketing Cost',fmt:'cur'},{k:'Marketing Cost Growth',fmt:'pct'},
    ]},
    { name:'Playtime', rows:[
      {k:'Daily LDAU',fmt:'big'},{k:'Daily Paying LDAU',fmt:'big'},{k:'Paid LDAU %',fmt:'pct'},
      {k:'Monthly LDAU',fmt:'big'},{k:'Monthly Paid LDAU',fmt:'big'},
      {k:'Total Playtime (Mins)',fmt:'min'},{k:'Paid Playtime (Mins)',fmt:'min'},
      {k:'Playtime/LDAU (Mins)',fmt:'dec'},{k:'Paid/Overall Playtime',fmt:'pct'},
    ]},
  ];

  const thead=`<thead><tr><th>Metric</th>${months.map(m=>`<th>${m.replace('2025',"'25").replace('2026',"'26")}</th>`).join('')}</tr></thead>`;
  let tbody='<tbody>';
  for(const grp of groups){
    tbody+=`<tr class="group-row"><td colspan="${months.length+1}">${grp.name}</td></tr>`;
    for(const row of grp.rows){
      const data=M[row.k]||[];
      const cells=data.map((v,i)=>{
        if(v==null)return'<td>—</td>';
        let d;
        if(row.fmt==='big') d=fmtBig(v);
        else if(row.fmt==='pct') d=v.toFixed(1)+'%';
        else if(row.fmt==='cur') d=fmtCur(v);
        else if(row.fmt==='min') d=fmtMin(v)+'M';
        else if(row.fmt==='dec') d=v.toFixed(2);
        else d=v.toString();
        return `<td${i===latI?' class="hi"':''}>${d}</td>`;
      }).join('');
      tbody+=`<tr><td>${row.label||row.k}</td>${cells}</tr>`;
    }
  }
  tbody+='</tbody>';
  document.getElementById('tbl').innerHTML=thead+tbody;

  // ── Status bar ───────────────────────────────────────────────────────────
  showLoading(false);
  document.getElementById('last-updated').innerHTML=
    `<span id="dot"></span>Live · Fetched ${new Date().toLocaleTimeString()} · ${tab.label} · ${RANGE_START} – ${RANGE_END}`;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
loadTab('overall');
setInterval(()=>loadTab(activeTab), 5*60*1000);
</script>
</body>
</html>
